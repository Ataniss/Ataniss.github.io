# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：推送 main 分支 或手动点击 Run workflow
on:
  push:
    branches: [main]
  workflow_dispatch:

# 权限：读写 contents + 写 pages
permissions:
  contents: write
  pages: write
  id-token: write

# 任务
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉代码（包含子模块/主题）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 缓存依赖，加速后续构建
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4. 安装 Hexo 及插件
      - name: Install dependencies
        run: npm ci   # 或者用 npm install

      # 5. 生成静态文件
      - name: Build
        run: npx hexo generate

      # 6. 部署到 gh-pages 分支（或 main，取决于你的 Pages 设置）
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages   # 如果你的 Pages 是 main，可改成 main
